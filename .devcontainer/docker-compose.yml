version: '3.8'

services:
  app:
    image: mcr.microsoft.com/devcontainers/typescript-node:1-20-bullseye
    volumes:
      - ..:/workspace:cached
    command: sleep infinity
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@localhost:5432/myday2?schema=public
      - NEXTAUTH_SECRET=myday2_secret_key_12345
      - NEXTAUTH_URL=https://${CODESPACE_NAME}-3000.app.github.dev
      - AUTH_SECRET=myday2_secret_key_12345
    network_mode: service:db

  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: myday2
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
